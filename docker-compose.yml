version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: noc_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: nocticketing
    ports:
      - "5432:5432"
    volumes:
      - noc_db_data:/var/lib/postgresql/data
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noc_app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/nocticketing?schema=public
      - HOSTNAME=0.0.0.0
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-my_super_secret_key_123}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - db
    # On start, wait a bit for DB, run Prisma migration, and start dev server
    command: sh -c "sleep 3 && npx prisma db push --accept-data-loss && node prisma/seed-permissions.js && npm run dev"
    restart: unless-stopped



volumes:
  noc_db_data:
